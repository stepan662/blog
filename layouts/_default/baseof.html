<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  {{- $title := .Title | default site.Title }}
  {{- if .IsHome }}<title>{{ site.Title }}</title>
  {{- else }}<title>{{ .Title }} · {{ site.Title }}</title>{{ end }}
  <meta name="description" content="{{ with .Description }}{{ . }}{{ else }}{{ site.Params.description }}{{ end }}">
  <meta name="author" content="{{ site.Params.author }}">
  <link rel="stylesheet" href="{{ "style.css" | relURL }}">
  <link rel="stylesheet" href="{{ "syntax.css" | relURL }}">
  {{ with .OutputFormats.Get "rss" -}}
    <link rel="alternate" type="application/rss+xml" href="{{ .Permalink }}" title="{{ site.Title }}">
  {{- end }}
  <link rel="icon" href="{{ "favicon.svg" | relURL }}" type="image/svg+xml">
  <link rel="icon" href="{{ "favicon-32.png" | relURL }}" sizes="32x32" type="image/png">
  <link rel="apple-touch-icon" href="{{ "apple-touch-icon.png" | relURL }}">
  <script>
    /* Cross-document view transitions. Each transition's flavour is chosen by
       tagging <html data-vt-direction> before a snapshot is captured, so the
       stylesheet can partition and animate the page to match: going deeper,
       content enters from the right; coming back, from the left; moving between
       posts follows their date order (newer from the right, older from the left);
       re-navigating to the page we're already on becomes "scroll" — the whole
       viewport is captured as one image that glides from old scroll to new.

       Every decision needs one fact: which page we came from. We keep it in
       sessionStorage — each page leaves its path for the next to read — which is
       trivial and works in every engine, unlike the Navigation API (absent in
       Safari). No-ops without cross-document transitions. */
    (function () {
      var root = document.documentElement;
      var norm = function (path) {
        return path.replace(/#.*$/, "").replace(/\/+$/, "") || "/";
      };
      /* Is the element fully above or below the viewport? Its view-transition
         snapshot is captured in viewport coordinates, so when it sits off-screen
         its box is a whole scroll-length from where it rests on the other page —
         the gap whose morph we want to bound. Missing element (head runs before
         the body is parsed) counts as on-screen; the pagereveal pass re-measures
         once the layout exists. */
      var offscreen = function (sel) {
        var el = document.querySelector(sel);
        if (!el) return false;
        var r = el.getBoundingClientRect();
        if (!r.height) return false;   // not laid out yet / hidden — don't bound
        return r.bottom <= 0 || r.top >= innerHeight;
      };

      /* Tag the page — before its snapshot is taken — from a single lexicographic
         comparison of where we came from and where we are. It covers every case
         because the URLs are built for it: a child path sorts after its parent, so
         descending into a section slides forward and climbing back slides back; and
         every post's URL starts with its date (/posts/YYYY-MM-DD-…), so a newer
         post sorts after an older one and moving between posts slides in date
         order. Same path → same page → a scroll. */
      var tag = function () {
        var from = sessionStorage.getItem("vt-from");
        if (from === null) return;
        var a = norm(from), b = norm(location.pathname);
        root.dataset.vtDirection = a === b ? "scroll" : b > a ? "forward" : "back";

        /* Bound the chrome's travel. The header/footer morph from their captured
           box on the old page to their box here; captured in viewport
           coordinates, that gap is a whole scroll-length whenever the chrome sat
           off-screen — and crossing it in a fixed 240ms reads as a fast fly. Tag
           each with the side that was off-screen so the stylesheet can keep the
           on-screen side at its own spot and give it a short slide, and take the
           off-screen (never-visible) side out of the morph:

             "exit"  — the destination side is off-screen (opening a long page
                       where the chrome falls below the fold). The stylesheet
                       drops the name here so the outgoing snapshot has nothing to
                       pair with on the far page: it stays put as an exiting group
                       and slides out in place, instead of being dragged off to
                       that far box.
             "enter" — only the old side was off-screen (coming back onto a page
                       where the chrome rests). Pin the group at that resting spot,
                       drop the old snapshot, slide the new one in.

           On-screen at both ends stays untagged and keeps the morph. The old side
           comes from the flag the previous page stored; the destination side we
           measure live (valid on the pagereveal pass, once this page's layout
           exists — the inline pass runs before the body is parsed and just sees
           on-screen). Cleared when near, since a bfcache-restored document is
           reused and must not keep a stale tag. */
        var bound = function (attr, key, sel) {
          var oldOff = !!sessionStorage.getItem(key), newOff = offscreen(sel);
          var state = newOff ? "exit" : oldOff ? "enter" : "";
          if (state) root.dataset[attr] = state;
          else delete root.dataset[attr];
        };
        bound("vtHeader", "vt-header-off", ".site-header");
        bound("vtFooter", "vt-footer-off", ".site-footer");
      };
      // Run it on a normal load (inline, before the snapshot, in every engine) and
      // again on pagereveal — which also fires when a page is shown from the
      // back/forward cache, where inline scripts do NOT re-run. Without the second
      // call, history navigations would reuse a stale tag and slide the wrong way.
      tag();
      addEventListener("pagereveal", tag);

      /* Leave our path for the next page as we go — in pagehide (not inline) so it's
         recorded even when leaving a page the browser restored from the back/forward
         cache, keeping "where we came from" correct across history navigation. */
      addEventListener("pagehide", function () {
        sessionStorage.setItem("vt-from", location.pathname);
        /* Record whether the chrome is off-screen as we leave, so the next page
           can read it as the "old side" of its bound() decision above. Measured
           here alongside the path for the same bfcache reason. */
        sessionStorage.setItem("vt-header-off", offscreen(".site-header") ? "1" : "");
        sessionStorage.setItem("vt-footer-off", offscreen(".site-footer") ? "1" : "");
      });

      /* Outgoing: a same-URL re-navigation must be tagged "scroll" before this
         page's snapshot is captured, so the whole viewport is grouped as one
         image that glides from the old scroll offset to the new. pageswap is the
         outgoing twin of pagereveal — it fires on this document at exactly that
         moment and carries the resolved destination, so the tag lands in time.
         Any other target falls back to the default partition; activation is null
         on a cross-origin navigation, where no same-origin transition runs. */
      addEventListener("pageswap", function (e) {
        if (!e.viewTransition) return;
        var dest = e.activation && e.activation.entry;
        if (dest && norm(new URL(dest.url).pathname) === norm(location.pathname)) {
          root.dataset.vtDirection = "scroll";
        } else {
          delete root.dataset.vtDirection;
        }
      });
    })();
  </script>
</head>
<body>
  <a class="skip" href="#main">skip to content</a>
  <div class="wrap">
    {{ partial "header.html" . }}
    <main id="main">
      {{ block "main" . }}{{ end }}
    </main>
    {{ partial "footer.html" . }}
  </div>
</body>
</html>
