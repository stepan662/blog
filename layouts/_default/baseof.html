<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  {{- $title := .Title | default site.Title }}
  {{- if .IsHome }}<title>{{ site.Title }}</title>
  {{- else }}<title>{{ .Title }} · {{ site.Title }}</title>{{ end }}
  <meta name="description" content="{{ with .Description }}{{ . }}{{ else }}{{ site.Params.description }}{{ end }}">
  <meta name="author" content="{{ site.Params.author }}">
  <link rel="stylesheet" href="{{ "style.css" | relURL }}">
  <link rel="stylesheet" href="{{ "syntax.css" | relURL }}">
  {{ with .OutputFormats.Get "rss" -}}
    <link rel="alternate" type="application/rss+xml" href="{{ .Permalink }}" title="{{ site.Title }}">
  {{- end }}
  <link rel="icon" href="{{ "favicon.svg" | relURL }}" type="image/svg+xml">
  <link rel="icon" href="{{ "favicon-32.png" | relURL }}" sizes="32x32" type="image/png">
  <link rel="apple-touch-icon" href="{{ "apple-touch-icon.png" | relURL }}">
  <script>
    /* Cross-document view transitions. Each transition's flavour is chosen by
       tagging <html data-vt-direction> before a snapshot is captured, so the
       stylesheet can partition and animate the page to match: going deeper,
       content enters from the right; coming back, from the left; moving between
       posts follows their date order (newer from the right, older from the left);
       re-navigating to the page we're already on becomes "scroll" — the whole
       viewport is captured as one image that glides from old scroll to new.

       Every decision needs one fact: which page we came from. We keep it in
       sessionStorage — each page leaves its path for the next to read — which is
       trivial and works in every engine, unlike the Navigation API (absent in
       Safari). No-ops without cross-document transitions. */
    (function () {
      var root = document.documentElement;
      var norm = function (path) {
        return path.replace(/#.*$/, "").replace(/\/+$/, "") || "/";
      };

      /* Tag the page — before its snapshot is taken — from a single lexicographic
         comparison of where we came from and where we are. It covers every case
         because the URLs are built for it: a child path sorts after its parent, so
         descending into a section slides forward and climbing back slides back; and
         every post's URL starts with its date (/posts/YYYY-MM-DD-…), so a newer
         post sorts after an older one and moving between posts slides in date
         order. Same path → same page → a scroll. */
      var tag = function () {
        var from = sessionStorage.getItem("vt-from");
        if (from === null) return;
        var a = norm(from), b = norm(location.pathname);
        root.dataset.vtDirection = a === b ? "scroll" : b > a ? "forward" : "back";
      };
      // Run it on a normal load (inline, before the snapshot, in every engine) and
      // again on pagereveal — which also fires when a page is shown from the
      // back/forward cache, where inline scripts do NOT re-run. Without the second
      // call, history navigations would reuse a stale tag and slide the wrong way.
      tag();
      addEventListener("pagereveal", tag);

      /* Leave our path for the next page as we go — in pagehide (not inline) so it's
         recorded even when leaving a page the browser restored from the back/forward
         cache, keeping "where we came from" correct across history navigation. */
      addEventListener("pagehide", function () {
        sessionStorage.setItem("vt-from", location.pathname);
      });

      /* Outgoing: a same-URL navigation is the one case the incoming tag can't set
         in time — the old page must be tagged "scroll" before *it* is captured. A
         click reveals the destination early enough; passive, so the navigation (and
         any reload) still happens. Anything else clears the tag for the default
         partition. In-page anchors and new-tab/download clicks don't replace this
         document, so leave them be. */
      addEventListener("click", function (e) {
        if (e.button !== 0 || e.metaKey || e.ctrlKey || e.shiftKey || e.altKey) return;
        var a = e.target.closest && e.target.closest("a[href]");
        if (!a || a.target === "_blank" || a.hasAttribute("download")) return;
        var u;
        try { u = new URL(a.href, location.href); } catch (err) { return; }
        if (u.origin !== location.origin || u.hash) return;
        if (norm(u.pathname) === norm(location.pathname)) {
          root.dataset.vtDirection = "scroll";
        } else {
          delete root.dataset.vtDirection;
        }
      });
    })();
  </script>
</head>
<body>
  <a class="skip" href="#main">skip to content</a>
  <div class="wrap">
    {{ partial "header.html" . }}
    <main id="main">
      {{ block "main" . }}{{ end }}
    </main>
    {{ partial "footer.html" . }}
  </div>
</body>
</html>
