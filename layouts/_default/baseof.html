<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  {{- $title := .Title | default site.Title }}
  {{- if .IsHome }}<title>{{ site.Title }}</title>
  {{- else }}<title>{{ .Title }} · {{ site.Title }}</title>{{ end }}
  <meta name="description" content="{{ with .Description }}{{ . }}{{ else }}{{ site.Params.description }}{{ end }}">
  <meta name="author" content="{{ site.Params.author }}">
  <link rel="stylesheet" href="{{ "style.css" | relURL }}">
  <link rel="stylesheet" href="{{ "syntax.css" | relURL }}">
  {{ with .OutputFormats.Get "rss" -}}
    <link rel="alternate" type="application/rss+xml" href="{{ .Permalink }}" title="{{ site.Title }}">
  {{- end }}
  <link rel="icon" href="{{ "favicon.svg" | relURL }}" type="image/svg+xml">
  <link rel="icon" href="{{ "favicon-32.png" | relURL }}" sizes="32x32" type="image/png">
  <link rel="apple-touch-icon" href="{{ "apple-touch-icon.png" | relURL }}">
  <script>
    /* Directional view transitions: compare the page we're leaving with the one
       we're entering, and tag <html> so the stylesheet can slide content the
       right way (deeper = in from the right, back = in from the left).
       Re-navigating to the current page tags it "scroll" instead, so the whole
       viewport is captured as one image and glides from the old scroll position
       to the new. No-ops in browsers without cross-document transitions. */
    (function () {
      var norm = function (path) {
        return path.replace(/\/+$/, "") || "/";
      };
      var depth = function (path) {
        return norm(path).split("/").filter(Boolean).length;
      };
      // The page we're navigating away from and the one we're arriving at, read
      // from the Navigation API — no state stashed between documents.
      var fromURL = function (act) {
        return act && act.from ? new URL(act.from.url).pathname : null;
      };
      addEventListener("pageswap", function (e) {
        if (!e.viewTransition) return;
        // Heading back to the page we're already on? Tag the outgoing document
        // so the header, footer, and content shed their transition-names and get
        // captured as one whole-viewport image. The incoming document does the
        // same in pagereveal, so both snapshots agree and slide as a single unit.
        var dest = e.activation && e.activation.entry && e.activation.entry.url;
        if (dest && norm(new URL(dest).pathname) === norm(location.pathname)) {
          document.documentElement.dataset.vtDirection = "scroll";
        }
      });
      addEventListener("pagereveal", function (e) {
        if (!e.viewTransition) return;
        var root = document.documentElement;
        var from = fromURL(window.navigation && navigation.activation);
        var to = location.pathname;
        /* Re-navigating to the page we're already on (clicking the header banner
           or an active nav link): identical content at a different scroll offset.
           The whole viewport was captured as one image (see the .wrap naming in
           the stylesheet), so the browser slides it from the old scroll position
           to the new on its own — no cross-fade, no scroll math. Same scroll (a
           plain reload) just means zero travel: nothing visibly moves. */
        if (from !== null && norm(from) === norm(to)) {
          root.dataset.vtDirection = "scroll";
          e.viewTransition.finished.finally(function () {
            delete root.dataset.vtDirection;
          });
          return;
        }
        var dir = "none";
        if (from !== null) {
          var a = depth(from), b = depth(to);
          dir = b > a ? "forward" : b < a ? "back" : "none";
        }
        root.dataset.vtDirection = dir;
        e.viewTransition.finished.finally(function () {
          delete root.dataset.vtDirection;
        });
      });
    })();
  </script>
</head>
<body>
  <a class="skip" href="#main">skip to content</a>
  <div class="wrap">
    {{ partial "header.html" . }}
    <main id="main">
      {{ block "main" . }}{{ end }}
    </main>
    {{ partial "footer.html" . }}
  </div>
</body>
</html>
