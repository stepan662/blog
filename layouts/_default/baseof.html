<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  {{- $title := .Title | default site.Title }}
  {{- if .IsHome }}<title>{{ site.Title }}</title>
  {{- else }}<title>{{ .Title }} · {{ site.Title }}</title>{{ end }}
  <meta name="description" content="{{ with .Description }}{{ . }}{{ else }}{{ site.Params.description }}{{ end }}">
  <meta name="author" content="{{ site.Params.author }}">
  <link rel="stylesheet" href="{{ "style.css" | relURL }}">
  <link rel="stylesheet" href="{{ "syntax.css" | relURL }}">
  {{ with .OutputFormats.Get "rss" -}}
    <link rel="alternate" type="application/rss+xml" href="{{ .Permalink }}" title="{{ site.Title }}">
  {{- end }}
  <link rel="icon" href="{{ "favicon.svg" | relURL }}" type="image/svg+xml">
  <link rel="icon" href="{{ "favicon-32.png" | relURL }}" sizes="32x32" type="image/png">
  <link rel="apple-touch-icon" href="{{ "apple-touch-icon.png" | relURL }}">
  <script>
    /* Directional view transitions: compare the page we're leaving with the one
       we're entering, and tag <html> so the stylesheet can slide content the
       right way (deeper = in from the right, back = in from the left). Same-page
       navigation skips the animation entirely. No-ops in browsers without
       cross-document transitions. */
    (function () {
      var norm = function (path) {
        return path.replace(/\/+$/, "") || "/";
      };
      var depth = function (path) {
        return norm(path).split("/").filter(Boolean).length;
      };
      addEventListener("pageswap", function (e) {
        if (e.viewTransition) {
          sessionStorage.setItem("vt-from", location.pathname);
        }
      });
      addEventListener("pagereveal", function (e) {
        if (!e.viewTransition) return;
        var from = sessionStorage.getItem("vt-from");
        var to = location.pathname;
        // Same page (e.g. clicking the header while already here): no animation.
        if (from !== null && norm(from) === norm(to)) {
          e.viewTransition.skipTransition();
          return;
        }
        var dir = "none";
        if (from !== null) {
          var a = depth(from), b = depth(to);
          dir = b > a ? "forward" : b < a ? "back" : "none";
        }
        document.documentElement.dataset.vtDirection = dir;
        e.viewTransition.finished.finally(function () {
          delete document.documentElement.dataset.vtDirection;
        });
      });
    })();
  </script>
</head>
<body>
  <a class="skip" href="#main">skip to content</a>
  <div class="wrap">
    {{ partial "header.html" . }}
    <main id="main">
      {{ block "main" . }}{{ end }}
    </main>
    {{ partial "footer.html" . }}
  </div>
</body>
</html>
