baseURL = 'https://granat.blog/'
title = 'Stepan Granat'

# Root-absolute links (/style.css, /posts). Requires the site to be served at
# the domain root and built with this baseURL — which the GH Actions workflow
# now does (it builds from hugo.toml, not the github.io/<repo> subpath).

[languages.en]
  locale = 'en-us'
  weight = 1

# Pretty, predictable output
enableRobotsTXT = true
disablePathToLower = false

[params]
  # Shown in the header frame and footer
  author = 'Stepan Granat'
  description = 'Personal site and blog of Stepan Granat.'
  # Social links: key = label shown in the footer, value = full URL.
  # Add any platform by adding a line — the template renders them all.
  # (For email, use a mailto: URL or just the address.)
  [params.social]
    github = 'https://github.com/stepan662'
    linkedin = 'https://www.linkedin.com/in/stepan-granat/'

[menus]
  [[menus.main]]
    name = 'home'
    pageRef = '/'
    weight = 10
  [[menus.main]]
    name = 'blog'
    pageRef = '/posts'
    weight = 20

[markup]
  [markup.highlight]
    noClasses = false   # emit CSS classes so our stylesheet controls colors
    tabWidth = 2
  [markup.goldmark.renderer]
    unsafe = true       # allow raw HTML in markdown when needed

[taxonomies]
  tag = 'tags'

[pagination]
  pagerSize = 10
